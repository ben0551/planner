services:
  pocketbase:
    image: ghcr.io/ben0551/planner/planner-pb:latest
    container_name: planner-pb
    restart: unless-stopped
    # Not exposed via Traefik — the app container proxies PocketBase internally
    ports:
      - "8090:8090"
    volumes:
      - ./pb/pb_data:/pb_data
    environment:
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default

  app:
    image: ghcr.io/ben0551/planner/planner-app:latest
    container_name: planner-app
    restart: unless-stopped
    environment:
      - PB_INTERNAL_URL=http://pocketbase:8090
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - APP_URL=${APP_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
      - HOUSEHOLD_MODE=${HOUSEHOLD_MODE:-single}
    depends_on:
      pocketbase:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.planner.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.planner.entrypoints=websecure"
      - "traefik.http.routers.planner.tls.certresolver=letsencrypt"
      - "traefik.http.services.planner.loadbalancer.server.port=3000"
    networks:
      - default
      - traefik

networks:
  default:
  traefik:
    external: true
