services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: homebase-pb
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./pb/pb_data:/pb_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
