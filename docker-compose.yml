services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: planner-pb
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./pb/pb_data:/pb_data
    environment:
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD}
    entrypoint: ["sh", "-c"]
    command: >-
      /pb/pocketbase superuser upsert "$$PB_ADMIN_EMAIL" "$$PB_ADMIN_PASSWORD" --dir=/pb_data ;
      exec /pb/pocketbase serve --http=0.0.0.0:8090 --dir=/pb_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    image: ghcr.io/ben0551/planner/planner-app:latest
    container_name: planner-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PB_INTERNAL_URL=http://pocketbase:8090
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD}
    depends_on:
      pocketbase:
        condition: service_healthy
